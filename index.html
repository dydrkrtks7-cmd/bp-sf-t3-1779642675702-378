    <style>
        /* Reset & Base */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: Impact, system-ui, 'Arial Black', sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.2;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Typography */
        h1 {
            font-size: clamp(3.5rem, 12vw, 8rem);
            letter-spacing: -0.03em;
            text-transform: uppercase;
            font-weight: 900;
            line-height: 0.9;
        }

        h2 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 700;
            text-transform: uppercase;
        }

        a {
            color: #ff3b00;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }

        a:hover {
            border-bottom-color: #ff3b00;
        }

        /* Layout & Spacing */
        header, main, footer {
            width: 100%;
            max-width: none;
        }

        .container {
            padding: 72px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 24px;
            }
        }

        section + section {
            margin-top: 120px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
                gap: 48px;
            }
        }

        /* Navigation - Brutalist Hamburg */
        nav {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 72px;
            border-bottom: 4px solid #ff3b00;
            background: #000;
        }

        .nav-logo {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
        }

        .nav-logo span {
            color: #ff3b00;
        }

        .nav-toggle {
            display: none;
            cursor: pointer;
            font-size: 2.5rem;
            color: #fff;
            background: none;
            border: 4px solid #ff3b00;
            padding: 8px 16px;
            line-height: 1;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-menu li a {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
            padding-bottom: 4px;
            transition: border-color 0.2s, color 0.2s;
        }

        .nav-menu li a:hover {
            border-bottom-color: #ff3b00;
            color: #ff3b00;
        }

        /* Hamburger toggle checkbox hack */
        #nav-check {
            display: none;
        }

        @media (max-width: 768px) {
            nav {
                padding: 20px 24px;
                flex-wrap: wrap;
            }

            .nav-toggle {
                display: block;
            }

            .nav-menu {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 16px;
                padding: 24px 0 0;
                border-top: 4px solid #ff3b00;
                margin-top: 16px;
            }

            #nav-check:checked ~ .nav-menu {
                display: flex;
            }

            .nav-menu li a {
                font-size: 1.5rem;
                display: block;
                padding: 12px 0;
                border-bottom: 2px solid #333;
            }
        }

        /* Hero Section */
        #hero {
            position: relative;
            padding: 120px 72px 80px;
            background: #000;
            border-bottom: 4px solid #ff3b00;
            overflow: hidden;
        }

        /* raw CSS texture overlay */
        #hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 40px,
                rgba(255,59,0,0.03) 40px,
                rgba(255,59,0,0.03) 42px
            );
            pointer-events: none;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero-content h1 {
            margin: 0;
            font-size: clamp(4rem, 14vw, 10rem);
            line-height: 0.85;
            color: #fff;
            text-shadow: 8px 8px 0 #ff3b00;
            letter-spacing: -4px;
            transform: skewX(-3deg);
        }

        .hero-content .subhead {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: #ff3b00;
            text-transform: uppercase;
            margin-top: 24px;
            padding-left: 12px;
            border-left: 8px solid #ff3b00;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .hero-content .cta {
            display: inline-block;
            margin-top: 48px;
            padding: 24px 48px;
            background: #ff3b00;
            color: #000;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 4px solid #fff;
            transform: rotate(-2deg);
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .hero-content .cta:hover {
            transform: rotate(0deg) scale(1.05);
            background: #fff;
            color: #000;
            border-color: #ff3b00;
        }

        @media (max-width: 768px) {
            #hero {
                padding: 80px 24px 60px;
            }
            .hero-content h1 {
                text-shadow: 4px 4px 0 #ff3b00;
                transform: skewX(0);
            }
            .hero-content .cta {
                padding: 16px 32px;
                font-size: 1.5rem;
                transform: none;
            }
        }

        /* Sections common */
        .section-title {
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 48px;
            display: inline-block;
            border-left: 12px solid #ff3b00;
            padding-left: 24px;
            transform: skewX(-5deg);
            text-transform: uppercase;
        }

        /* Reviews */
        #reviews {
            padding: 72px;
            background: #111;
            border-top: 4px solid #ff3b00;
            border-bottom: 4px solid #ff3b00;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 48px;
        }

        .review-card {
            background: #000;
            border: 4px solid #333;
            padding: 32px;
            position: relative;
            transform: rotate(0.5deg);
            transition: transform 0.2s, border-color 0.2s;
        }

        .review-card:nth-child(even) {
            transform: rotate(-0.5deg);
        }

        .review-card:hover {
            border-color: #ff3b00;
            transform: rotate(0deg) scale(1.02);
        }

        .review-card .stars {
            color: #ff3b00;
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }

        .review-card blockquote {
            font-size: 1.3rem;
            line-height: 1.4;
            font-style: italic;
            margin: 16px 0;
            color: #ccc;
        }

        .review-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-top: 2px solid #333;
            padding-top: 16px;
            margin-top: 16px;
            color: #888;
        }

        .review-card .meta strong {
            color: #fff;
        }

        @media (max-width: 768px) {
            #reviews {
                padding: 72px 24px;
            }
            .review-card {
                transform: none !important;
            }
        }

        /* Contact / CTA strip */
        #contact {
            padding: 72px;
            background: #000;
            border-top: 4px solid #ff3b00;
            text-align: center;
        }

        #contact h2 {
            font-size: clamp(2rem, 5vw, 4rem);
        }

        .phone-link {
            display: inline-block;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #ff3b00;
            font-weight: 900;
            border: 6px solid #ff3b00;
            padding: 24px 48px;
            margin-top: 32px;
            transform: rotate(1deg);
